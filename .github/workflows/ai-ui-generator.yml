name: 🎨 AI UI Generator

on:
  pull_request:
    types: [labeled]

jobs:
  generate:
    if: |
      github.event.action == 'labeled' && 
      github.event.label.name == 'ui-generate'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate Bot Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Get Changed Scaffold Files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          separator: ","
          files: |
            **/*.scaffold.svelte
            **/*.scaffold.svg

      - name: Check Scaffold Files
        id: check
        run: |
          if [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "🔍 변경된 scaffold 파일:"
            echo "${{ steps.changed-files.outputs.all_changed_files }}"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "⚠️ 변경된 scaffold 파일 없음"
          fi

      - name: Install pnpm
        if: steps.check.outputs.found == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: steps.check.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        if: steps.check.outputs.found == 'true'
        run: pnpm install

      # Figma 스펙 캐시 복원
      - name: Restore Figma Cache
        if: steps.check.outputs.found == 'true'
        uses: actions/cache@v4
        with:
          path: .figma-cache
          key: figma-spec-${{ hashFiles('**/*.scaffold.svelte') }}
          restore-keys: |
            figma-spec-

      - name: Run AI UI Generator
        if: steps.check.outputs.found == 'true'
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL_PRO: ${{ vars.GEMINI_MODEL_PRO || 'gemini-3.1-pro-preview' }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: npx tsx scripts/ai-ui-generator.ts

      - name: Commit & Push
        if: steps.generate.outputs.generated == 'true'
        run: |
          git config user.name "trendiv-ui[bot]"
          git config user.email "trendiv-ui[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🎨 AI Generated: ${{ steps.generate.outputs.files }} [skip review]"
          git push

      - name: Comment Success
        if: steps.generate.outputs.generated == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const files = `${{ steps.generate.outputs.files }}`.split(',').map(f => `- \`${f.trim()}\``).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ✅ AI 코드 생성 완료!\n\n### 생성된 파일\n${files}\n\n> 💡 배포하려면 \`preview\` 라벨을 붙여주세요.`
            });

      - name: Comment No Scaffold
        if: steps.check.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ⚠️ Scaffold 파일 없음\n\n이 PR에 \`.scaffold.svelte\` 파일 변경사항이 없습니다.\n\n### 사용법\n1. \`ComponentName.scaffold.svelte\` 파일 생성\n2. PR description에 이미지 추가 (### ComponentName 섹션)\n3. \`ui-generate\` 라벨 추가`
            });

      - name: Remove Label
        if: always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: 'ui-generate'
            });
      - name: Comment Failure
        if: failure() && steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ AI 코드 생성 실패\n\n로그를 확인해주세요.\n\n### 체크리스트\n1. \`.scaffold.svg\` 파일이 커밋에 포함되었나요?\n2. Figma URL이 있다면 접근 권한이 있나요?`
            });
